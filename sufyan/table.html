<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple HTML Table</title>
</head>
<body>

    <h2>Student Information Table</h2>

    <!-- Table container with structural styling attributes -->
    <table border="1" cellpadding="10" cellspacing="0">
        
        <!-- Table Header: Defines column names -->
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Course</th>
            </tr>
        </thead>
        
        <!-- Table Body: Contains the actual rows of data -->
        <tbody>
            <tr>
                <td>1</td>
                <td>Ali Khan</td>
                <td>ali@example.com</td>
                <td>Web Development</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Sana Ahmed</td>
                <td>sana@example.com</td>
                <td>Graphic Design</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Zain Malik</td>
                <td>zain@example.com</td>
                <td>Python Programming</td>
            </tr>
        </tbody>

    </table>

</body>
</html>
